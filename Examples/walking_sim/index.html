<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blitz3D WASM - Walking Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border: 1px solid #444;
            border-radius: 8px;
        }

        .debug-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: monospace;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <h1>WALKING SIMULATOR</h1>
        <p>CLICK TO START</p>
        <p>ARROW KEYS / WASD to Move | MOUSE to Look</p>
    </div>
    
    <div id="ui">
        <div id="status">INITIALIZING...</div>
    </div>

    <div id="crosshair"></div>

    <div class="debug-info" id="debug">
        POS: 0, 0, 0
    </div>

    <div id="canvas-container"></div>
    
    <script src="walking_sim.js"></script>
</body>
</html>
