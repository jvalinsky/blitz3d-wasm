<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blitz3D WASM Debugger Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Blitz3D → WASM Debugger Demo</h1>
    <div class="controls">
      <button id="btnReset">Reset</button>
      <button id="btnStep">Step</button>
      <button id="btnContinue">Continue</button>
      <span id="status"></span>
    </div>
  </header>

  <main>
    <section class="pane">
      <div class="pane-header">BB Source</div>
      <pre id="bbSource" class="code"></pre>
    </section>
    <section class="pane">
      <div class="pane-header">WASM (WAT)</div>
      <pre id="wasmSource" class="code"></pre>
    </section>
    <aside class="side">
      <div><strong>Current:</strong> <span id="currentStmt"></span></div>
      <div><strong>Function:</strong> <span id="currentFunc"></span></div>
      <div><strong>Stack:</strong>
        <ul id="stack"></ul>
      </div>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
