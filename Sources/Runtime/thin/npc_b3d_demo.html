<!DOCTYPE html>
<html>
<head>
    <title>Blitz3D WASM - NPC Model Demo (B3D Loading)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            color: #0f0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #canvas { border: 1px solid #333; background: #000; }
        #log {
            width: 800px; height: 150px;
            background: #0a0a1a; border: 1px solid #333;
            padding: 10px; overflow-y: auto; white-space: pre;
            margin-top: 10px; font-size: 11px;
        }
        h1 { color: #4af; margin: 10px; font-size: 18px; }
        #controls { margin: 10px; }
        button {
            background: #2a4a6a; color: #fff;
            border: 1px solid #4a6a8a;
            padding: 8px 16px; margin: 5px;
            cursor: pointer; font-family: monospace;
        }
        button:hover { background: #3a5a7a; }
        button:disabled { background: #333; color: #666; }
        #stats { color: #4af; margin: 10px; font-size: 14px; }
        .info { color: #888; font-size: 12px; margin: 5px 0; }
        select {
            background: #2a4a6a; color: #fff;
            border: 1px solid #4a6a8a;
            padding: 8px; margin: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Blitz3D WASM - NPC Model Loading & Animation</h1>
    <p class="info">Loads B3D models and animates via WASM-compiled BB code pattern</p>
    <div id="controls">
        <select id="modelSelect">
            <option value="035.b3d">SCP-035 (Containment Pod)</option>
            <option value="173_2.b3d">SCP-173 (Statue)</option>
            <option value="049.b3d">SCP-049 (Doctor)</option>
            <option value="guard.b3d">MTF Guard</option>
            <option value="classd.b3d">Class D Personnel</option>
        </select>
        <button onclick="loadNPC()" id="btnLoad">Load NPC Model</button>
        <button onclick="toggleAnimation()" id="btnAnim" disabled>Toggle Animation</button>
        <button onclick="setAnimSpeed(0.5)" id="btnSlow" disabled>0.5x</button>
        <button onclick="setAnimSpeed(1.0)" id="btnNormal" disabled>1.0x</button>
        <button onclick="setAnimSpeed(2.0)" id="btnFast" disabled>2.0x</button>
        <button onclick="resetCamera()">Reset Camera</button>
    </div>
    <div id="stats">Select a model and click "Load NPC Model"</div>
    <canvas id="canvas" width="800" height="500"></canvas>
    <div id="log"></div>
    
    <script src="runtime.js"></script>
    <script>
    const logDiv = document.getElementById('log');
    const statsDiv = document.getElementById('stats');
    const origLog = console.log;
    console.log = (...args) => {
        origLog(...args);
        logDiv.innerHTML += args.join(' ') + '\n';
        logDiv.scrollTop = logDiv.scrollHeight;
    };
    
    let runtime, npcEntity = null;
    let animPlaying = false;
    let animTime = 0;
    let animSpeed = 1.0;
    
    function log(msg) {
        console.log(msg);
    }
    
    async function loadNPC() {
        const modelName = document.getElementById('modelSelect').value;
        const modelPath = `../../../web/public/GFX/npcs/${modelName}`;
        
        document.getElementById('btnLoad').disabled = true;
        document.getElementById('btnLoad').textContent = 'Loading...';
        
        log('=== NPC Model Demo ===');
        log(`Model: ${modelName}`);
        log('');
        log('Initializing Blitz3D Thin Runtime...');
        
        const canvas = document.getElementById('canvas');
        runtime = new Blitz3DThinRuntime(canvas);
        const imports = runtime.getImports();
        
        // Setup scene
        const camId = imports.env.CreateCamera(0);
        imports.env.PositionEntity(camId, 0, 2, -10);
        runtime.activeCamera.lookAt(0, 1, 0);
        
        const dirLight = imports.env.CreateLight(1);
        imports.env.PositionEntity(dirLight, 5, 10, -5);
        imports.env.RotateEntity(dirLight, 45, 45, 0);
        
        imports.env.CreateLight(0, 0); // Ambient
        
        // Ground
        const ground = imports.env.CreatePlane(0);
        imports.env.PositionEntity(ground, 0, 0, 0);
        imports.env.ScaleEntity(ground, 30, 1, 30);
        
        // Load B3D model via WASM import (LoadAnimMesh)
        log('');
        log(`Loading: ${modelPath}`);
        
        try {
            // Call LoadAnimMesh - this would be called from WASM-compiled BB code
            npcEntity = await imports.env.LoadAnimMesh(stringToPtr(modelPath));
            
            if (npcEntity && npcEntity > 0) {
                log(`B3D loaded successfully! Entity ID: ${npcEntity}`);
                
                // Position NPC
                imports.env.PositionEntity(npcEntity, 0, 0, 0);
                
                // Start animation
                imports.env.Animate(npcEntity, 1, 1.0, 0, 0);
                
                animPlaying = true;
                animTime = 0;
                
                log('Animation started (loop mode)');
            } else {
                throw new Error('LoadAnimMesh returned invalid entity');
            }
        } catch (e) {
            log(`B3D load failed: ${e.message}`);
            log('Using placeholder NPC...');
            npcEntity = createPlaceholderNPC();
        }
        
        // Enable controls
        document.getElementById('btnAnim').disabled = false;
        document.getElementById('btnSlow').disabled = false;
        document.getElementById('btnNormal').disabled = false;
        document.getElementById('btnFast').disabled = false;
        
        statsDiv.textContent = `Model: ${modelName} | Entity: ${npcEntity}`;
        log('');
        log('Controls:');
        log('  WASD - Move camera');
        log('  SPACE - Toggle animation');
        log('  1/2/3 - Animation speed');
        log('');
        log('Demo ready!');
        
        // Start game loop
        gameLoop();
    }
    
    function stringToPtr(str) {
        if (!runtime || !runtime.memory) return 0;
        const encoder = new TextEncoder();
        const bytes = encoder.encode(str);
        const ptr = runtime.stringHeapPtr;
        runtime.stringHeapPtr += bytes.length + 1;
        
        const view = new DataView(runtime.memory.buffer);
        const heap = new Uint8Array(runtime.memory.buffer);
        
        heap.set(bytes, ptr);
        heap[ptr + bytes.length] = 0; // null terminator
        
        // Write string header
        view.setInt32(ptr - 8, ptr, true); // data ptr
        view.setInt32(ptr - 4, bytes.length, true); // length
        
        return ptr - 8;
    }
    
    function createPlaceholderNPC() {
        const group = new THREE.Group();
        
        // Create a detailed humanoid
        const bodyGeom = new THREE.BoxGeometry(0.7, 1.2, 0.35);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3a4a5a });
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        body.position.y = 1.1;
        group.add(body);
        
        const headGeom = new THREE.BoxGeometry(0.35, 0.4, 0.35);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xd4a574 });
        const head = new THREE.Mesh(headGeom, headMat);
        head.position.y = 1.9;
        group.add(head);
        
        // Eyes
        const eyeGeom = new THREE.BoxGeometry(0.08, 0.05, 0.02);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
        leftEye.position.set(-0.1, 1.95, 0.17);
        group.add(leftEye);
        const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
        rightEye.position.set(0.1, 1.95, 0.17);
        group.add(rightEye);
        
        const armGeom = new THREE.BoxGeometry(0.18, 0.8, 0.18);
        const armMat = new THREE.MeshStandardMaterial({ color: 0x3a4a5a });
        
        const leftArm = new THREE.Mesh(armGeom, armMat);
        leftArm.position.set(-0.55, 1.1, 0);
        group.add(leftArm);
        
        const rightArm = new THREE.Mesh(armGeom, armMat);
        rightArm.position.set(0.55, 1.1, 0);
        group.add(rightArm);
        
        const legGeom = new THREE.BoxGeometry(0.25, 0.8, 0.25);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x2a3a4a });
        
        const leftLeg = new THREE.Mesh(legGeom, legMat);
        leftLeg.position.set(-0.22, 0.4, 0);
        group.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(legGeom, legMat);
        rightLeg.position.set(0.22, 0.4, 0);
        group.add(rightLeg);
        
        runtime.scene.add(group);
        
        const entityId = runtime.nextEntityId++;
        runtime.entities.set(entityId, {
            obj: group,
            type: 'npc',
            animations: [{ frames: 30 }],
            animMode: 1,
            animSpeed: 1.0,
            animTime: 0,
            animPlaying: true,
            animLength: 30,
            body, head, leftArm, rightArm, leftLeg, rightLeg,
            leftEye, rightEye
        });
        
        return entityId;
    }
    
    function toggleAnimation() {
        if (npcEntity && runtime) {
            const ent = runtime.entities.get(npcEntity);
            if (ent && ent.animations) {
                animPlaying = !animPlaying;
                ent.animPlaying = animPlaying;
                ent.animMode = animPlaying ? 1 : 0;
                runtime.imports.env.Animate(npcEntity, ent.animMode, ent.animSpeed, 0, 0);
                log(`Animation: ${animPlaying ? 'ON' : 'OFF'}`);
            }
        }
    }
    
    function setAnimSpeed(speed) {
        if (npcEntity && runtime) {
            animSpeed = speed;
            const ent = runtime.entities.get(npcEntity);
            if (ent) {
                ent.animSpeed = speed;
                runtime.imports.env.Animate(npcEntity, ent.animMode, speed, 0, 0);
            }
            log(`Speed: ${speed}x`);
        }
    }
    
    function resetCamera() {
        if (runtime && runtime.activeCamera) {
            runtime.activeCamera.position.set(0, 2, -10);
            runtime.activeCamera.lookAt(0, 1, 0);
            log('Camera reset');
        }
    }
    
    function updateAnimation(dt) {
        if (!npcEntity || !runtime) return;
        
        const ent = runtime.entities.get(npcEntity);
        if (!ent || !ent.animPlaying || !ent.animations) return;
        
        ent.animTime += dt * 30 * ent.animSpeed;
        
        if (ent.animTime >= ent.animLength) {
            ent.animTime = 0;
        }
        
        animTime = ent.animTime;
        
        const t = ent.animTime / ent.animLength;
        const swing = Math.sin(t * Math.PI * 2) * 0.6;
        
        if (ent.leftArm) ent.leftArm.rotation.x = swing;
        if (ent.rightArm) ent.rightArm.rotation.x = -swing;
        if (ent.leftLeg) ent.leftLeg.rotation.x = -swing * 0.4;
        if (ent.rightLeg) ent.rightLeg.rotation.x = swing * 0.4;
        
        if (ent.body) {
            ent.body.position.y = 1.1 + Math.abs(Math.sin(t * Math.PI * 2)) * 0.08;
        }
        
        if (ent.obj) {
            ent.obj.rotation.y = t * Math.PI * 0.3;
        }
    }
    
    let lastTime = performance.now();
    let frame = 0;
    
    function gameLoop() {
        const now = performance.now();
        const dt = (now - lastTime) / 1000;
        lastTime = now;
        
        updateAnimation(dt);
        runtime.render();
        
        frame++;
        if (frame % 30 === 0) {
            const animStatus = runtime.entities.get(npcEntity)?.animPlaying ? 'ON' : 'OFF';
            statsDiv.textContent = `Entity: ${npcEntity} | Anim: ${animStatus} | Time: ${animTime.toFixed(1)} | Speed: ${animSpeed}x`;
        }
        
        requestAnimationFrame(gameLoop);
    }
    
    document.addEventListener('keydown', (e) => {
        if (!runtime || !runtime.activeCamera) return;
        
        const speed = 0.15;
        switch(e.key.toLowerCase()) {
            case 'w': runtime.activeCamera.position.z += speed; break;
            case 's': runtime.activeCamera.position.z -= speed; break;
            case 'a': runtime.activeCamera.position.x -= speed; break;
            case 'd': runtime.activeCamera.position.x += speed; break;
            case ' ': e.preventDefault(); toggleAnimation(); break;
        }
    });
    
    log('Blitz3D WASM NPC Demo');
    log('Select a model and click "Load NPC Model"');
    </script>
</body>
</html>
