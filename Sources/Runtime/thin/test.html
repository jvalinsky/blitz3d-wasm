<!DOCTYPE html>
<html>
<head>
    <title>Blitz3D Thin Runtime Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            color: #0f0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #canvas {
            border: 1px solid #333;
            background: #000;
        }
        #log {
            width: 800px;
            height: 200px;
            background: #0a0a1a;
            border: 1px solid #333;
            padding: 10px;
            overflow-y: auto;
            white-space: pre;
            margin-top: 10px;
        }
        .success { color: #4f4; }
        .error { color: #f44; }
        .info { color: #ff0; }
    </style>
</head>
<body>
    <h1>Blitz3D Thin Runtime Test</h1>
    <canvas id="canvas" width="800" height="600"></canvas>
    <div id="log"></div>
    
    <script src="runtime.js"></script>
    <script>
    const logDiv = document.getElementById('log');
    const realLog = console.log;
    console.log = (...args) => {
        realLog(...args);
        logDiv.innerHTML += args.join(' ') + '\n';
        logDiv.scrollTop = logDiv.scrollHeight;
    };
    
    async function main() {
        console.log('Initializing Thin Runtime...');
        
        const canvas = document.getElementById('canvas');
        const runtime = new Blitz3DThinRuntime(canvas);
        
        console.log('Loading WASM...');
        
        try {
            const instance = await runtime.loadAndRun('simple.wasm');
            console.log('WASM loaded and Main() executed!');
            
            // List exported functions
            const exports = Object.keys(instance.exports).filter(k => typeof instance.exports[k] === 'function');
            console.log(`Exported functions: ${exports.length}`);
            
            // Check for key functions
            const keyFns = ['AddToCounter%', 'SetPosition', 'GetDistance#'];
            for (const fn of keyFns) {
                if (instance.exports[fn]) {
                    console.log(`  Found: ${fn}`);
                }
            }
            
            // Test AddToCounter
            if (instance.exports['AddToCounter%']) {
                console.log('\nTesting AddToCounter...');
                let result = instance.exports['AddToCounter%'](10);
                console.log(`AddToCounter(10) = ${result}`);
                result = instance.exports['AddToCounter%'](5);
                console.log(`AddToCounter(5) = ${result}`);
            }
            
            // Test GetDistance
            if (instance.exports['SetPosition'] && instance.exports['GetDistance#']) {
                console.log('\nTesting Distance...');
                instance.exports['SetPosition'](3.0, 4.0, 0.0);
                const dist = instance.exports['GetDistance#']();
                console.log(`Distance from (3,4,0) to origin = ${dist} (expected: 5)`);
            }
            
            console.log('\n=== TEST COMPLETE ===');
            
        } catch (e) {
            console.log(`Error: ${e.message}`);
            console.error(e);
        }
    }
    
    main();
    </script>
</body>
</html>
