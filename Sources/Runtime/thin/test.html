<!DOCTYPE html>
<html>
<head>
    <title>Blitz3D Thin Runtime - BB Particle System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            color: #0f0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #canvas {
            border: 1px solid #333;
            background: #000;
        }
        #log {
            width: 800px;
            height: 120px;
            background: #0a0a1a;
            border: 1px solid #333;
            padding: 10px;
            overflow-y: auto;
            white-space: pre;
            margin-top: 10px;
            font-size: 11px;
        }
        h1 { color: #4af; margin: 10px; font-size: 18px; }
        .info { color: #888; }
    </style>
</head>
<body>
    <h1>Blitz3D WASM - Particle System (BB Logic + JS Rendering)</h1>
    <canvas id="canvas" width="800" height="500"></canvas>
    <div id="log"></div>
    
    <script src="runtime.js"></script>
    <script>
    const logDiv = document.getElementById('log');
    console.log = (...args) => {
        logDiv.innerHTML += args.join(' ') + '\n';
        logDiv.scrollTop = logDiv.scrollHeight;
    };
    
    async function main() {
        console.log('Loading WASM particle system...');
        
        const canvas = document.getElementById('canvas');
        const runtime = new Blitz3DThinRuntime(canvas);
        
        // Load WASM
        const response = await fetch('particles.wasm');
        const bytes = await response.arrayBuffer();
        const imports = runtime.getImports();
        const { instance } = await WebAssembly.instantiate(bytes, imports);
        window.wasmInstance = instance;  // For debugging
        runtime.memory = instance.exports.memory;
        
        // Run Main() - this creates 5 particles via BB code
        // The BB code calls CreateSprite(), PositionEntity(), etc.
        // which are handled by our thin runtime
        if (instance.exports.Main) {
            instance.exports.Main();
        }
        
        const initialCount = instance.exports['GetParticleCount%']();
        console.log(`BB created ${initialCount} particles`);
        console.log(`Entities in scene: ${runtime.entities.size}`);
        
        // Setup camera
        const camId = imports.env.CreateCamera(0);
        imports.env.PositionEntity(camId, 0, 2, -6);
        runtime.activeCamera.lookAt(0, 1, 0);
        
        // Add light
        imports.env.CreateLight(0, 0); // Ambient
        
        // Add ground plane for reference
        const groundGeom = new THREE.PlaneGeometry(10, 10);
        const groundMat = new THREE.MeshBasicMaterial({ 
            color: 0x222244, 
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.5
        });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        ground.rotation.x = Math.PI / 2;
        ground.position.y = -0.5;
        runtime.scene.add(ground);
        
        // Set FPSfactor global (if exported)
        if (instance.exports.FPSfactor) {
            instance.exports.FPSfactor.value = 1.0;
        }
        
        console.log('Starting game loop - particles managed by BB code');
        
        let frame = 0;
        let lastSpawn = 0;
        
        function gameLoop() {
            // Update particles - this is the BB function that:
            // - Applies gravity (BB logic)
            // - Updates positions (calls PositionEntity -> JS)
            // - Fades alpha (calls EntityAlpha -> JS)
            // - Removes expired particles (calls FreeEntity -> JS, Delete -> BB)
            instance.exports.UpdateParticles();
            
            // Spawn new particles periodically via BB
            if (frame - lastSpawn > 30) {
                // Call BB function to create particle
                // The BB code handles all the logic
                const x = (Math.random() - 0.5) * 3;
                const z = (Math.random() - 0.5) * 3;
                instance.exports['CreateParticleAt%'](x, 2.5, z);
                lastSpawn = frame;
            }
            
            // Fixed camera looking at spawn point
            // (no rotation so we can see particles fall)
            
            // Render
            runtime.render();
            
            // Stats every 60 frames
            if (frame % 60 === 0) {
                const count = instance.exports['GetParticleCount%']();
                console.log(`Frame ${frame}: ${count} particles, ${runtime.entities.size} entities`);
            }
            
            frame++;
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    }
    
    main().catch(e => console.log('Error:', e.message));
    </script>
</body>
</html>
