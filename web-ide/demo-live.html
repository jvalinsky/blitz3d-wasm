<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz3D Web Compiler - Live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        h1 { margin: 0; font-size: 2.5rem; }
        .subtitle { margin-top: 10px; opacity: 0.9; font-size: 1.1rem; }
        .content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .panel { display: flex; flex-direction: column; gap: 10px; }
        .panel-header {
            font-weight: bold;
            font-size: 1.2rem;
            color: #667eea;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
        }
        textarea {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            resize: vertical;
            min-height: 400px;
            line-height: 1.5;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        pre {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            padding: 15px;
            background: #f8f8f8;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            overflow: auto;
            min-height: 400px;
            max-height: 600px;
            line-height: 1.4;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        button:active { transform: translateY(0); }
        .error { color: #d32f2f; background: #ffebee; padding: 15px; border-radius: 5px; border-left: 4px solid #d32f2f; font-family: monospace; white-space: pre-wrap; }
        .success { color: #2e7d32; background: #e8f5e9; padding: 10px 15px; border-radius: 5px; border-left: 4px solid #2e7d32; margin-bottom: 10px; }
        .info { color: #1976d2; background: #e3f2fd; padding: 10px 15px; border-radius: 5px; border-left: 4px solid #1976d2; margin-bottom: 10px; font-size: 0.9rem; }
        @media (max-width: 1024px) { .content { grid-template-columns: 1fr; } }
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        .tab {
            padding: 8px 16px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Blitz3D Web Compiler</h1>
            <div class="subtitle">Real TypeScript Compiler - Fully Client-Side</div>
        </header>
        <div class="content">
            <div class="panel">
                <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <span>📝 Blitz3D Source Code</span>
                    <select id="examples" onchange="loadExample()" style="padding: 5px 10px; border-radius: 3px; border: 1px solid #ccc;">
                        <option value="">📚 Load Example...</option>
                        <option value="hello">Hello World</option>
                        <option value="math">Math Operations</option>
                        <option value="loops">Loops (For/While/Repeat)</option>
                        <option value="functions">Functions</option>
                        <option value="types">Custom Types</option>
                        <option value="arrays">Arrays & Dim</option>
                        <option value="strings">String Operations</option>
                        <option value="conditionals">If/Else/Select</option>
                    </select>
                </div>
                <div id="editor" style="height: 400px; border: 2px solid #e0e0e0; border-radius: 5px;"></div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="compile()" style="flex: 1">▶️ Compile to WASM</button>
                    <button onclick="runWasm()" style="flex: 1; background: linear-gradient(135deg, #2e7d32 0%, #66bb6a 100%);">▶️ Run Program</button>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button onclick="shareURL()" style="flex: 1; background: linear-gradient(135deg, #9C27B0 0%, #BA68C8 100%);">🔗 Share URL</button>
                    <button onclick="saveLocal()" style="flex: 1; background: linear-gradient(135deg, #FF5722 0%, #FF8A65 100%);">💾 Save</button>
                    <button onclick="loadLocal()" style="flex: 1; background: linear-gradient(135deg, #607D8B 0%, #90A4AE 100%);">📂 Load</button>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header">⚙️ Compilation Output</div>
                <div id="output-status"></div>
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('wasm')">WebAssembly (WAT)</div>
                    <div class="tab" onclick="switchTab('ast')">AST (JSON)</div>
                    <div class="tab" onclick="switchTab('console')">Program Output</div>
                </div>
                <div id="wasm-output" class="tab-content active">
                    <pre id="output">Click "Compile" to generate WebAssembly...</pre>
                </div>
                <div id="ast-output" class="tab-content">
                    <pre id="ast">Abstract Syntax Tree will appear here...</pre>
                </div>
                <div id="console-output" class="tab-content">
                    <pre id="console" style="background: #1e1e1e; color: #d4d4d4;">Click "Run Program" to execute compiled WASM...</pre>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/wabt@1.0.24/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="dist/compiler.bundle.js?v=2"></script>
    <script>
        // Compiler classes are already available globally from the bundle
        let compiledWat = null; // Store the compiled WAT for execution
        let editor = null; // Monaco editor instance
        
        // Example programs
        const examples = {
            hello: `; Hello World\nPrint "Hello from Blitz3D!"`,
            math: `; Math Operations\nx% = 10\ny% = 5\nPrint x + y\nPrint x - y\nPrint x * y`,
            loops: `; For loop\nFor i% = 1 To 5\n    Print i\nNext`,
            functions: `; Functions\nFunction Add%(a%, b%)\n    Return a + b\nEnd Function\n\nPrint Add(5, 10)`,
            types: `; Custom Types\nType Enemy\n    Field Health%\n    Field Name$\nEnd Type\n\nPrint "Type declared!"`,
            arrays: `; Arrays with Dim\nDim arr%(10)\narr(0) = 42\narr(1) = 99\narr(2) = arr(0) + arr(1)\nPrint arr(0)\nPrint arr(1)\nPrint arr(2)`,
            strings: `; String Printing\nPrint "Hello World"\nPrint "Strings work!"`,
            conditionals: `; If/ElseIf/Else + Select/Case\nx% = 85\nIf x >= 90 Then\n    Print "A"\nElseIf x >= 80 Then\n    Print "B"\nElse\n    Print "F"\nEndIf\n\nSelect x\n    Case 85\n        Print "Eighty-five!"\n    Case 90\n        Print "Ninety!"\n    Default\n        Print "Something else"\nEnd Select`
        };
        
        window.loadExample = function() {
            const sel = document.getElementById('examples');
            if (sel.value && examples[sel.value] && editor) {
                editor.setValue(examples[sel.value]);
                sel.value = '';
            }
        };
        
        window.switchTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'wasm') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('wasm-output').classList.add('active');
            } else if (tab === 'ast') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('ast-output').classList.add('active');
            } else if (tab === 'console') {
                document.querySelectorAll('.tab')[2].classList.add('active');
                document.getElementById('console-output').classList.add('active');
            }
        };
        
        window.compile = function() {
            const outputElement = document.getElementById('output');
            const astElement = document.getElementById('ast');
            const statusElement = document.getElementById('output-status');
            
            // Get source from Monaco editor if available, otherwise from textarea
            const source = editor ? editor.getValue() : document.getElementById('source').value;
            
            try {
                const startTime = performance.now();
                
                // Lexical analysis
                const { Lexer, Parser, CodeGenerator } = window.Blitz3DCompiler;
                const lexer = new Lexer(source);
                const tokenResult = lexer.tokenize();
                
                if (tokenResult.errors.length > 0) {
                    throw new Error('Lexer errors:\n' + tokenResult.errors.map(e => e.message).join('\n'));
                }
                
                const tokenCount = tokenResult.tokens.length - 1; // -1 for EOF
                
                // Parsing
                const parser = new Parser(source);
                const ast = parser.parse();
                
                // Code generation
                const codegen = new CodeGenerator();
                const wat = codegen.generate(ast);
                
                const endTime = performance.now();
                const compileTime = (endTime - startTime).toFixed(2);
                
                // Store and display results
                compiledWat = wat;
                outputElement.textContent = wat;
                astElement.textContent = JSON.stringify(ast, null, 2);
                
                const lines = source.split('\n').length;
                statusElement.innerHTML = `
                    <div class="success">✅ Compilation successful!</div>
                    <div class="info">
                        📊 Statistics:<br>
                        • Source lines: ${lines}<br>
                        • Tokens: ${tokenCount}<br>
                        • Compile time: ${compileTime}ms<br>
                        • WASM size: ${wat.length} bytes
                    </div>
                `;
            } catch (e) {
                outputElement.textContent = 'Compilation failed. See error above.';
                astElement.textContent = 'No AST generated due to errors.';
                statusElement.innerHTML = `<div class="error">❌ Compilation Error:\n\n${e.message}</div>`;
                console.error('Compilation error:', e);
            }
        };
        
        // Run compiled WASM
        window.runWasm = async function() {
            const consoleElement = document.getElementById('console');
            const statusElement = document.getElementById('output-status');
            
            if (!compiledWat) {
                statusElement.innerHTML = '<div class="error">❌ Please compile the code first!</div>';
                return;
            }
            
            try {
                // Switch to console tab
                switchTab('console');
                consoleElement.textContent = 'Executing WASM...\n\n';
                
                // Program output buffer
                let output = [];
                
                // Runtime imports for Blitz3D functions
                let memory = null;
                
                // String helper: read null-terminated string from WASM memory
                function readStr(ptr) {
                    if (!memory) return '';
                    const view = new Uint8Array(memory.buffer);
                    let s = '';
                    while (ptr < view.length && view[ptr] !== 0) {
                        s += String.fromCharCode(view[ptr]);
                        ptr++;
                    }
                    return s;
                }

                // String helper: allocate a string on the WASM heap
                // Reads __heap_ptr global, writes string, bumps pointer
                function allocStr(str, instance) {
                    if (!memory) return 0;
                    const heapPtrGlobal = instance.exports.__heap_ptr;
                    let ptr = heapPtrGlobal ? heapPtrGlobal.value : 4096;
                    const view = new Uint8Array(memory.buffer);
                    for (let i = 0; i < str.length; i++) {
                        view[ptr + i] = str.charCodeAt(i) & 0xFF;
                    }
                    view[ptr + str.length] = 0; // null terminator
                    const result = ptr;
                    ptr += str.length + 1;
                    // Align to 4 bytes
                    ptr = (ptr + 3) & ~3;
                    if (heapPtrGlobal) heapPtrGlobal.value = ptr;
                    return result;
                }

                let wasmInstance = null;

                const imports = {
                    env: {
                        print: (value) => {
                            consoleElement.textContent += value + '\n';
                        },
                        printFloat: (value) => {
                            consoleElement.textContent += value + '\n';
                        },
                        printString: (ptr) => {
                            consoleElement.textContent += readStr(ptr) + '\n';
                        },

                        // String built-ins
                        b3d_len: (ptr) => readStr(ptr).length,
                        b3d_left: (ptr, n) => allocStr(readStr(ptr).substring(0, n), wasmInstance),
                        b3d_right: (ptr, n) => { const s = readStr(ptr); return allocStr(s.substring(s.length - n), wasmInstance); },
                        b3d_mid: (ptr, start, len) => allocStr(readStr(ptr).substring(start - 1, start - 1 + len), wasmInstance),
                        b3d_instr: (ptr1, ptr2, start) => {
                            const s = readStr(ptr1);
                            const find = readStr(ptr2);
                            const idx = s.indexOf(find, (start || 1) - 1);
                            return idx === -1 ? 0 : idx + 1; // Blitz3D is 1-based
                        },
                        b3d_upper: (ptr) => allocStr(readStr(ptr).toUpperCase(), wasmInstance),
                        b3d_lower: (ptr) => allocStr(readStr(ptr).toLowerCase(), wasmInstance),
                        b3d_trim: (ptr) => allocStr(readStr(ptr).trim(), wasmInstance),
                        b3d_chr: (code) => allocStr(String.fromCharCode(code), wasmInstance),
                        b3d_asc: (ptr) => { const s = readStr(ptr); return s.length > 0 ? s.charCodeAt(0) : 0; },
                        b3d_str: (val) => allocStr(String(val), wasmInstance),
                        b3d_string: (ptr, count) => allocStr(readStr(ptr).repeat(count), wasmInstance),
                        b3d_replace: (ptr, findPtr, replPtr) => allocStr(readStr(ptr).split(readStr(findPtr)).join(readStr(replPtr)), wasmInstance),

                        // Math built-ins (Blitz3D uses degrees for trig)
                        b3d_abs: (x) => Math.abs(x),
                        b3d_sgn: (x) => x > 0 ? 1 : x < 0 ? -1 : 0,
                        b3d_sin: (x) => Math.round(Math.sin(x * Math.PI / 180) * 1000) / 1000 | 0,
                        b3d_cos: (x) => Math.round(Math.cos(x * Math.PI / 180) * 1000) / 1000 | 0,
                        b3d_tan: (x) => Math.round(Math.tan(x * Math.PI / 180) * 1000) / 1000 | 0,
                        b3d_asin: (x) => Math.round(Math.asin(x) * 180 / Math.PI) | 0,
                        b3d_acos: (x) => Math.round(Math.acos(x) * 180 / Math.PI) | 0,
                        b3d_atan: (x) => Math.round(Math.atan(x) * 180 / Math.PI) | 0,
                        b3d_atan2: (y, x) => Math.round(Math.atan2(y, x) * 180 / Math.PI) | 0,
                        b3d_sqr: (x) => Math.sqrt(x) | 0,
                        b3d_floor: (x) => Math.floor(x),
                        b3d_ceil: (x) => Math.ceil(x),
                        b3d_log: (x) => Math.log(x) | 0,
                        b3d_exp: (x) => Math.exp(x) | 0,

                        // Conversion
                        b3d_int: (x) => x | 0,
                        b3d_float: (x) => x,

                        // Random
                        b3d_rand: (lo, hi) => Math.floor(Math.random() * (hi - lo + 1)) + lo,
                        b3d_rnd: (lo, hi) => Math.floor(Math.random() * (hi - lo + 1)) + lo,
                        b3d_seedrnd: (seed) => { /* JS Math.random can't be seeded, no-op */ },

                        // System
                        b3d_millisecs: () => Date.now() | 0,

                        // Power operator helper
                        b3d_pow: (base, exp) => Math.pow(base, exp) | 0,
                    }
                };
                
                // Strip error comments and (start ...) directive so we can
                // call main() manually after capturing the memory export
                const cleanWat = compiledWat.split('\n')
                    .filter(line => !line.includes('; ERROR:'))
                    .filter(line => !line.trim().startsWith('(start '))
                    .join('\n');

                // Convert WAT to WASM using wabt
                const wabt = await WabtModule();
                const wasmModule = wabt.parseWat('program.wat', cleanWat);
                const { buffer } = wasmModule.toBinary({});

                // Instantiate, capture memory, then call main
                const module = await WebAssembly.instantiate(buffer, imports);
                wasmInstance = module.instance;
                memory = module.instance.exports.memory;

                if (module.instance.exports.main) {
                    module.instance.exports.main();
                }
                
                consoleElement.textContent += '\n\u2705 Program executed successfully!';
                statusElement.innerHTML = '<div class="success">✅ Program executed! Check Program Output tab.</div>';
                
            } catch (e) {
                consoleElement.textContent += `\n\n❌ Runtime Error:\n${e.message}\n\n${e.stack || ''}`;
                statusElement.innerHTML = `<div class="error">❌ Runtime Error:\n\n${e.message}</div>`;
                console.error('WASM execution error:', e);
            }
        };
        
        // Initialize Monaco Editor
        require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function() {
            let initialCode = '; Simple Blitz3D Example\nx% = 5\ny% = 10\nz% = x + y\nPrint z';
            
            // Check for URL parameter (shared code)
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('code')) {
                try {
                    const base64 = decodeURIComponent(urlParams.get('code'));
                    const compressed = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
                    initialCode = pako.inflate(compressed, { to: 'string' });
                } catch (error) {
                    console.error('Error loading shared code:', error);
                    alert('Error loading shared code. Using default example.');
                }
            } else {
                // Try to restore auto-saved code
                try {
                    const autosaved = localStorage.getItem('blitz3d-web-ide-autosave');
                    if (autosaved) {
                        initialCode = autosaved;
                    }
                } catch (e) {
                    console.warn('Could not restore auto-saved code:', e);
                }
            }
            
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: initialCode,
                language: 'vb',
                theme: 'vs',
                minimap: { enabled: false },
                fontSize: 14,
                lineNumbers: 'on',
                automaticLayout: true
            });
            
            // Auto-compile on change
            let compileTimeout;
            editor.onDidChangeModelContent(() => {
                clearTimeout(compileTimeout);
                compileTimeout = setTimeout(() => compile(), 1000);
            });
            
            // Initial compile
            setTimeout(() => compile(), 500);
        });
        

    </script>
</body>
</html>
