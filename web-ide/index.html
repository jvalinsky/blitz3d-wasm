<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz3D Web Compiler Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 2.5rem;
      }

      .subtitle {
        margin-top: 10px;
        opacity: 0.9;
        font-size: 1.1rem;
      }

      .content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        padding: 20px;
      }

      .panel {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .panel-header {
        font-weight: bold;
        font-size: 1.2rem;
        color: #667eea;
        padding: 10px;
        background: #f5f5f5;
        border-radius: 5px;
      }

      textarea {
        font-family: "Consolas", "Monaco", monospace;
        font-size: 14px;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 5px;
        resize: vertical;
        min-height: 300px;
        line-height: 1.5;
      }

      textarea:focus {
        outline: none;
        border-color: #667eea;
      }

      pre {
        font-family: "Consolas", "Monaco", monospace;
        font-size: 13px;
        padding: 15px;
        background: #f8f8f8;
        border: 2px solid #e0e0e0;
        border-radius: 5px;
        overflow: auto;
        min-height: 300px;
        max-height: 500px;
        line-height: 1.4;
      }

      button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 1.1rem;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      .error {
        color: #d32f2f;
        background: #ffebee;
        padding: 15px;
        border-radius: 5px;
        border-left: 4px solid #d32f2f;
        font-family: monospace;
      }

      .success {
        color: #2e7d32;
        background: #e8f5e9;
        padding: 10px 15px;
        border-radius: 5px;
        border-left: 4px solid #2e7d32;
        margin-bottom: 10px;
      }

      @media (max-width: 1024px) {
        .content {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🚀 Blitz3D Web Compiler</h1>
        <div class="subtitle">Client-Side Blitz3D to WebAssembly Compiler</div>
      </header>

      <div class="content">
        <div class="panel">
          <div class="panel-header">📝 Blitz3D Source Code</div>
          <textarea
            id="source"
            spellcheck="false"
          >
; Blitz3D Example
x% = 5
y% = 10
z% = x + y
Print z</textarea>
          <button onclick="compile()">▶️ Compile to WASM</button>
        </div>

        <div class="panel">
          <div class="panel-header">⚙️ WebAssembly Output (WAT)</div>
          <div id="output-status"></div>
          <pre id="output">Click "Compile" to generate WebAssembly...</pre>
        </div>
      </div>
    </div>

    <script type="module">
      import { Parser } from "./src/compiler/parser.ts";
      import { CodeGenerator } from "./src/compiler/codegen.ts";

      window.compile = function () {
        const source = document.getElementById("source").value;
        const outputElement = document.getElementById("output");
        const statusElement = document.getElementById("output-status");

        try {
          // Parse
          const parser = new Parser(source);
          const ast = parser.parse();

          // Generate WASM
          const codegen = new CodeGenerator();
          const wat = codegen.generate(ast);

          // Display
          outputElement.textContent = wat;
          statusElement.innerHTML =
            '<div class="success">✅ Compilation successful!</div>';
        } catch (e) {
          outputElement.textContent = "";
          statusElement.innerHTML =
            `<div class="error">❌ ${e.message}</div>`;
        }
      };

      // Compile on load
      compile();
    </script>
  </body>
</html>
