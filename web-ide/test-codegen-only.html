<!DOCTYPE html>
<html>
  <head>
    <title>CodeGen Test - Blitz3D Web IDE</title>
    <style>
      body {
        font-family: monospace;
        max-width: 1000px;
        margin: 20px auto;
        padding: 20px;
      }
      h1 {
        color: #333;
      }
      textarea {
        width: 100%;
        height: 200px;
        font-family: "Courier New", monospace;
        font-size: 14px;
      }
      button {
        background: #ff9800;
        color: white;
        padding: 10px 20px;
        border: none;
        cursor: pointer;
        font-size: 16px;
        margin: 10px 0;
      }
      button:hover {
        background: #e68900;
      }
      .output {
        background: #f5f5f5;
        padding: 15px;
        border: 1px solid #ddd;
        margin: 10px 0;
        white-space: pre-wrap;
        max-height: 500px;
        overflow: auto;
        font-size: 12px;
      }
      .error {
        background: #ffe6e6;
        border-color: #ff0000;
      }
      .success {
        background: #e6ffe6;
        border-color: #00cc00;
      }
    </style>
  </head>
  <body>
    <h1>⚙️ CodeGen Test (WASM Generation)</h1>
    <p>Tests full pipeline: lexer + parser + codegen. Should never crash.</p>

    <textarea
      id="source"
    >
; Test code generation
x% = 10
y% = 20
z% = x + y
Print z</textarea>

    <button onclick="testCodeGen()">▶️ Generate WASM</button>

    <div id="output" class="output">Click "Generate WASM" to test...</div>

    <script src="dist/compiler.bundle.js"></script>
    <script>
      function testCodeGen() {
        const source = document.getElementById("source").value;
        const output = document.getElementById("output");

        try {
          const startTime = performance.now();
          const { Lexer, Parser, CodeGenerator } =
            window.Blitz3DCompiler;

          // Lexer
          const lexer = new Lexer(source);
          const { tokens, errors: lexerErrors } = lexer.tokenize();

          if (lexerErrors.length > 0) {
            output.className = "output error";
            output.textContent = `❌ Lexer Errors:\n\n${
              lexerErrors.map((e) =>
                `Line ${e.line}, Col ${e.column}: ${e.message}`
              ).join("\n")
            }`;
            return;
          }

          // Parser
          const parser = new Parser(source);
          const ast = parser.parse();

          if (parser.errors.length > 0) {
            output.className = "output error";
            output.textContent = `❌ Parser Errors:\n\n${
              parser.errors.join("\n")
            }`;
            return;
          }

          // CodeGen
          const codegen = new CodeGenerator();
          const wat = codegen.generate(ast);

          const endTime = performance.now();
          const time = (endTime - startTime).toFixed(2);

          output.className = "output success";
          output.textContent = `✅ Success! (${time}ms)\n\n`;
          output.textContent +=
            `WAT Output (${wat.length} bytes):\n\n${wat}`;
        } catch (error) {
          output.className = "output error";
          output.textContent =
            `💥 Fatal Error:\n\n${error.message}\n\n${error.stack}`;
        }
      }

      // Auto-run on load
      testCodeGen();
    </script>
  </body>
</html>
