<!DOCTYPE html>
<html>
<head>
    <title>Parser Test - Blitz3D Web IDE</title>
    <style>
        body {
            font-family: monospace;
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
        }
        h1 { color: #333; }
        textarea {
            width: 100%;
            height: 200px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        button {
            background: #2196F3;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
        }
        button:hover { background: #0b7dda; }
        .output {
            background: #f5f5f5;
            padding: 15px;
            border: 1px solid #ddd;
            margin: 10px 0;
            white-space: pre-wrap;
            max-height: 500px;
            overflow: auto;
        }
        .error { background: #ffe6e6; border-color: #ff0000; }
        .success { background: #e6ffe6; border-color: #00cc00; }
    </style>
</head>
<body>
    <h1>🌳 Parser Test (AST Generation)</h1>
    <p>Tests lexer + parser - generates Abstract Syntax Tree. Should never crash.</p>
    
    <textarea id="source">; Test the parser
Function Add%(a%, b%)
    Return a + b
End Function

x% = 5
y% = 10
Print Add(x, y)</textarea>
    
    <button onclick="testParser()">▶️ Parse</button>
    
    <div id="output" class="output">Click "Parse" to test...</div>
    
    <script src="dist/compiler.bundle.js"></script>
    <script>
        function testParser() {
            const source = document.getElementById('source').value;
            const output = document.getElementById('output');
            
            try {
                const startTime = performance.now();
                const { Parser } = window.Blitz3DCompiler;
                const parser = new Parser(source);
                const ast = parser.parse();
                const endTime = performance.now();
                
                const time = (endTime - startTime).toFixed(2);
                
                if (parser.errors.length > 0) {
                    output.className = 'output error';
                    output.textContent = `❌ Parser Errors (${time}ms):\n\n${parser.errors.join('\n')}`;
                } else {
                    output.className = 'output success';
                    output.textContent = `✅ Success! (${time}ms)\n\n`;
                    output.textContent += `AST (${ast.statements.length} statements):\n\n`;
                    output.textContent += JSON.stringify(ast, null, 2);
                }
            } catch (error) {
                output.className = 'output error';
                output.textContent = `💥 Fatal Error:\n\n${error.message}\n\n${error.stack}`;
            }
        }
        
        // Auto-run on load
        testParser();
    </script>
</body>
</html>
