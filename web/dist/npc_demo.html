<!DOCTYPE html>
<html>
<head>
    <title>Blitz3D - NPC Demo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        
        const log = (msg) => {
            document.getElementById('log').innerHTML += msg + '\n';
            console.log(msg);
        };
        
        async function init() {
            log('Initializing NPC Demo...');
            
            // Setup Three.js
            const canvas = document.getElementById('canvas');
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(800, 600);
            renderer.setClearColor(0x1a1a2e);
            
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 800/600, 0.1, 1000);
            camera.position.set(0, 2, 5);
            camera.lookAt(0, 1, 0);
            
            // Lights
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);
            scene.add(new THREE.AmbientLight(0x404060, 0.5));
            
            // Floor
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 20),
                new THREE.MeshStandardMaterial({ color: 0x333344 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);
            
            // Grid
            scene.add(new THREE.GridHelper(20, 20, 0x444466, 0x333355));
            
            // Simple NPC placeholder (cube person)
            const npc = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 1, 0.4),
                new THREE.MeshStandardMaterial({ color: 0x666666 })
            );
            body.position.y = 1;
            npc.add(body);
            
            // Head
            const head = new THREE.Mesh(
                new THREE.BoxGeometry(0.4, 0.4, 0.4),
                new THREE.MeshStandardMaterial({ color: 0xffccaa })
            );
            head.position.y = 1.7;
            npc.add(head);
            
            // Arms
            const armGeo = new THREE.BoxGeometry(0.2, 0.7, 0.2);
            const armMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
            const leftArm = new THREE.Mesh(armGeo, armMat);
            leftArm.position.set(-0.5, 1, 0);
            npc.add(leftArm);
            const rightArm = new THREE.Mesh(armGeo, armMat);
            rightArm.position.set(0.5, 1, 0);
            npc.add(rightArm);
            
            // Legs
            const legGeo = new THREE.BoxGeometry(0.25, 0.8, 0.25);
            const legMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const leftLeg = new THREE.Mesh(legGeo, legMat);
            leftLeg.position.set(-0.2, 0.4, 0);
            npc.add(leftLeg);
            const rightLeg = new THREE.Mesh(legGeo, legMat);
            rightLeg.position.set(0.2, 0.4, 0);
            npc.add(rightLeg);
            
            scene.add(npc);
            log('NPC placeholder created');
            
            // Simple room walls
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x555555, side: THREE.DoubleSide });
            const wallGeo = new THREE.PlaneGeometry(10, 4);
            
            const backWall = new THREE.Mesh(wallGeo, wallMat);
            backWall.position.set(0, 2, 5);
            backWall.rotation.y = Math.PI;
            scene.add(backWall);
            
            const leftWall = new THREE.Mesh(wallGeo, wallMat);
            leftWall.position.set(-5, 2, 0);
            leftWall.rotation.y = Math.PI / 2;
            scene.add(leftWall);
            
            const rightWall = new THREE.Mesh(wallGeo, wallMat);
            rightWall.position.set(5, 2, 0);
            rightWall.rotation.y = -Math.PI / 2;
            scene.add(rightWall);
            
            log('Room created');
            
            // AI State
            let aiState = 'idle';
            let targetX = 0;
            let targetZ = 0;
            let walkTimer = 0;
            let idleTimer = Math.random() * 3;
            const walkSpeed = 0.02;
            
            // Animation state
            let walkCycle = 0;
            
            function updateAI(dt) {
                if (aiState === 'idle') {
                    idleTimer -= dt;
                    if (idleTimer <= 0) {
                        // Pick random target within room
                        targetX = (Math.random() - 0.5) * 8;
                        targetZ = (Math.random() - 0.5) * 8;
                        aiState = 'walking';
                        log(`NPC walking to (${targetX.toFixed(1)}, ${targetZ.toFixed(1)})`);
                    }
                } else if (aiState === 'walking') {
                    const dx = targetX - npc.position.x;
                    const dz = targetZ - npc.position.z;
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    
                    if (dist < 0.2) {
                        aiState = 'idle';
                        idleTimer = 1 + Math.random() * 3;
                        log('NPC reached destination, idling');
                    } else {
                        // Move towards target
                        npc.position.x += (dx / dist) * walkSpeed;
                        npc.position.z += (dz / dist) * walkSpeed;
                        
                        // Face direction
                        npc.rotation.y = Math.atan2(dx, dz);
                        
                        // Walk animation
                        walkCycle += 0.15;
                        leftArm.rotation.x = Math.sin(walkCycle) * 0.5;
                        rightArm.rotation.x = -Math.sin(walkCycle) * 0.5;
                        leftLeg.rotation.x = -Math.sin(walkCycle) * 0.5;
                        rightLeg.rotation.x = Math.sin(walkCycle) * 0.5;
                    }
                }
            }
            
            // Animation loop
            let lastTime = performance.now();
            let frame = 0;
            
            function animate() {
                const now = performance.now();
                const dt = (now - lastTime) / 1000;
                lastTime = now;
                
                updateAI(dt);
                
                // Camera follows NPC slightly
                camera.lookAt(npc.position.x, 1.5, npc.position.z);
                
                renderer.render(scene, camera);
                
                frame++;
                if (frame % 60 === 0) {
                    document.getElementById('stats').textContent = 
                        `State: ${aiState} | Pos: (${npc.position.x.toFixed(1)}, ${npc.position.z.toFixed(1)})`;
                }
                
                requestAnimationFrame(animate);
            }
            
            animate();
            log('Animation started - NPC will wander around the room');
        }
        
        
    </script>
    <script>
        
    </script>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            color: #0f0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #canvas { border: 1px solid #333; }
        #log {
            width: 800px; height: 120px;
            background: #0a0a1a; border: 1px solid #333;
            padding: 10px; overflow-y: auto; white-space: pre;
            margin-top: 10px; font-size: 11px;
        }
        h1 { color: #4af; margin: 10px; font-size: 18px; }
        #stats { color: #4af; margin: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Blitz3D - NPC Demo with AI</h1>
    <div id="stats">Loading...</div>
    <canvas id="canvas" width="800" height="600"></canvas>
    <div id="log"></div>
</body>
</html>
