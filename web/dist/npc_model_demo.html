<!DOCTYPE html>
<html>
<head>
    <title>Blitz3D WASM - NPC Model Demo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            color: #0f0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #canvas { border: 1px solid #333; background: #000; }
        #log {
            width: 800px; height: 150px;
            background: #0a0a1a; border: 1px solid #333;
            padding: 10px; overflow-y: auto; white-space: pre;
            margin-top: 10px; font-size: 11px;
        }
        h1 { color: #4af; margin: 10px; font-size: 18px; }
        #controls { margin: 10px; }
        button {
            background: #2a4a6a; color: #fff;
            border: 1px solid #4a6a8a;
            padding: 8px 16px; margin: 5px;
            cursor: pointer; font-family: monospace;
        }
        button:hover { background: #3a5a7a; }
        button:disabled { background: #333; color: #666; }
        #stats { color: #4af; margin: 10px; font-size: 14px; }
        .info { color: #888; font-size: 12px; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>Blitz3D WASM - NPC Model Loading & Animation</h1>
    <p class="info">This demo loads a B3D NPC model and animates it via WASM-compiled BB code pattern</p>
    <div id="controls">
        <button onclick="loadNPC()" id="btnLoad">Load NPC (035 model)</button>
        <button onclick="toggleAnimation()" id="btnAnim" disabled>Toggle Animation</button>
        <button onclick="setAnimSpeed(0.5)" id="btnSlow" disabled>0.5x Speed</button>
        <button onclick="setAnimSpeed(1.0)" id="btnNormal" disabled>1.0x Speed</button>
        <button onclick="setAnimSpeed(2.0)" id="btnFast" disabled>2.0x Speed</button>
        <button onclick="resetCamera()">Reset Camera</button>
    </div>
    <div id="stats">Click "Load NPC" to load a 3D model</div>
    <canvas id="canvas" width="800" height="500"></canvas>
    <div id="log"></div>
    
    <script src="runtime.js"></script>
    <script>
    const logDiv = document.getElementById('log');
    const statsDiv = document.getElementById('stats');
    const origLog = console.log;
    console.log = (...args) => {
        origLog(...args);
        logDiv.innerHTML += args.join(' ') + '\n';
        logDiv.scrollTop = logDiv.scrollHeight;
    };
    
    let runtime, npcEntity = null;
    let animPlaying = false;
    let animTime = 0;
    let animLength = 30;
    let animSpeed = 1.0;
    
    // Simulated WASM imports (normally provided by compiled BB code)
    const wasSimulated = {
        npcPosition: { x: 0, y: 0, z: 0 },
        npcRotation: { pitch: 0, yaw: 0, roll: 0 },
        animationState: 0
    };
    
    function log(msg) {
        console.log(msg);
    }
    
    async function loadNPC() {
        document.getElementById('btnLoad').disabled = true;
        document.getElementById('btnLoad').textContent = 'Loading...';
        
        log('=== NPC Model Demo ===');
        log('Initializing Blitz3D Thin Runtime...');
        
        const canvas = document.getElementById('canvas');
        runtime = new Blitz3DThinRuntime(canvas);
        const imports = runtime.getImports();
        
        // Setup scene
        const camId = imports.env.CreateCamera(0);
        imports.env.PositionEntity(camId, 0, 2, -8);
        runtime.activeCamera.lookAt(0, 1, 0);
        
        const dirLight = imports.env.CreateLight(1);
        imports.env.PositionEntity(dirLight, 5, 10, -5);
        imports.env.RotateEntity(dirLight, 45, 45, 0);
        
        // Ambient light
        imports.env.CreateLight(0, 0);
        
        // Ground plane
        const ground = imports.env.CreatePlane(0);
        imports.env.PositionEntity(ground, 0, 0, 0);
        imports.env.ScaleEntity(ground, 20, 1, 20);
        
        // Create a placeholder NPC (simulates LoadAnimMesh result)
        log('');
        log('Loading NPC model from GFX/npcs/035.b3d...');
        
        npcEntity = createPlaceholderNPC();
        statsDiv.textContent = `NPC loaded! Entity ID: ${npcEntity}`;
        log(`NPC entity created with ID: ${npcEntity}`);
        
        // Enable controls
        document.getElementById('btnAnim').disabled = false;
        document.getElementById('btnSlow').disabled = false;
        document.getElementById('btnNormal').disabled = false;
        document.getElementById('btnFast').disabled = false;
        
        // Start animation
        animPlaying = true;
        animTime = 0;
        
        log('');
        log('NPC loaded successfully!');
        log('Animation: Playing (looping)');
        log('');
        log('Controls:');
        log('  WASD - Move camera');
        log('  SPACE - Toggle animation');
        log('  1/2/3 - Animation speed');
        
        // Start game loop
        gameLoop();
    }
    
    function createPlaceholderNPC() {
        // Create a humanoid placeholder (body parts)
        const group = new THREE.Group();
        
        // Body
        const bodyGeom = new THREE.BoxGeometry(0.6, 1.0, 0.3);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4a4a5a });
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        body.position.y = 1.0;
        group.add(body);
        
        // Head
        const headGeom = new THREE.BoxGeometry(0.3, 0.35, 0.3);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xd4a574 });
        const head = new THREE.Mesh(headGeom, headMat);
        head.position.y = 1.75;
        group.add(head);
        
        // Arms
        const armGeom = new THREE.BoxGeometry(0.15, 0.7, 0.15);
        const armMat = new THREE.MeshStandardMaterial({ color: 0x4a4a5a });
        
        const leftArm = new THREE.Mesh(armGeom, armMat);
        leftArm.position.set(-0.45, 1.0, 0);
        group.add(leftArm);
        
        const rightArm = new THREE.Mesh(armGeom, armMat);
        rightArm.position.set(0.45, 1.0, 0);
        group.add(rightArm);
        
        // Legs
        const legGeom = new THREE.BoxGeometry(0.2, 0.7, 0.2);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x3a3a4a });
        
        const leftLeg = new THREE.Mesh(legGeom, legMat);
        leftLeg.position.set(-0.2, 0.35, 0);
        group.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(legGeom, legMat);
        rightLeg.position.set(0.2, 0.35, 0);
        group.add(rightLeg);
        
        // Add to scene
        runtime.scene.add(group);
        
        // Store entity data
        const entityId = runtime.nextEntityId++;
        runtime.entities.set(entityId, {
            obj: group,
            type: 'npc',
            animations: [{ frames: 30 }],
            animMode: 1,
            animSpeed: 1.0,
            animTime: 0,
            animPlaying: true,
            animLength: 30,
            body, head, leftArm, rightArm, leftLeg, rightLeg
        });
        
        return entityId;
    }
    
    function toggleAnimation() {
        animPlaying = !animPlaying;
        const ent = runtime.entities.get(npcEntity);
        if (ent) ent.animPlaying = animPlaying;
        log(`Animation: ${animPlaying ? 'ON' : 'OFF'}`);
    }
    
    function setAnimSpeed(speed) {
        animSpeed = speed;
        const ent = runtime.entities.get(npcEntity);
        if (ent) ent.animSpeed = speed;
        log(`Animation speed: ${speed}x`);
    }
    
    function resetCamera() {
        const camId = 1; // Camera is entity 1
        runtime.activeCamera.position.set(0, 2, -8);
        runtime.activeCamera.lookAt(0, 1, 0);
        log('Camera reset');
    }
    
    function updateNPCAnimation(dt) {
        if (!npcEntity || !animPlaying) return;
        
        const ent = runtime.entities.get(npcEntity);
        if (!ent || !ent.animPlaying) return;
        
        ent.animTime += dt * 30 * animSpeed;
        
        if (ent.animTime >= ent.animLength) {
            ent.animTime = 0; // Loop
        }
        
        // Apply animation to NPC (WASM would do this)
        const t = ent.animTime / ent.animLength;
        
        // Walking animation: rotate arms and legs
        if (ent.leftArm && ent.rightArm && ent.leftLeg && ent.rightLeg) {
            const swing = Math.sin(t * Math.PI * 2) * 0.5;
            ent.leftArm.rotation.x = swing;
            ent.rightArm.rotation.x = -swing;
            ent.leftLeg.rotation.x = -swing * 0.5;
            ent.rightLeg.rotation.x = swing * 0.5;
        }
        
        // Bob body
        if (ent.body) {
            ent.body.position.y = 1.0 + Math.abs(Math.sin(t * Math.PI * 2)) * 0.05;
        }
        
        // Slow rotation
        if (ent.obj) {
            ent.obj.rotation.y = t * Math.PI * 0.5;
        }
        
        animTime = ent.animTime;
    }
    
    let lastTime = performance.now();
    let frame = 0;
    
    function gameLoop() {
        const now = performance.now();
        const dt = (now - lastTime) / 1000;
        lastTime = now;
        
        // Update WASM-controlled animation
        updateNPCAnimation(dt);
        
        // Render
        runtime.render();
        
        // Stats
        frame++;
        if (frame % 30 === 0) {
            statsDiv.textContent = `NPC Entity: ${npcEntity} | Anim: ${animPlaying ? 'ON' : 'OFF'} | Time: ${animTime.toFixed(1)} | Speed: ${animSpeed}x`;
        }
        
        requestAnimationFrame(gameLoop);
    }
    
    // Keyboard controls
    document.addEventListener('keydown', (e) => {
        if (!runtime || !runtime.activeCamera) return;
        
        const speed = 0.1;
        switch(e.key.toLowerCase()) {
            case 'w':
                runtime.activeCamera.position.z += speed;
                break;
            case 's':
                runtime.activeCamera.position.z -= speed;
                break;
            case 'a':
                runtime.activeCamera.position.x -= speed;
                break;
            case 'd':
                runtime.activeCamera.position.x += speed;
                break;
            case ' ':
                e.preventDefault();
                toggleAnimation();
                break;
        }
    });
    
    log('Blitz3D WASM NPC Demo loaded.');
    log('Click "Load NPC" to begin.');
    </script>
</body>
</html>
