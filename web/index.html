<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCP: Containment Breach (Blitz3D WASM)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        }
        #game-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: radial-gradient(circle at center, rgba(30,30,30,0.85), rgba(0,0,0,0.95));
            color: #ddd;
            text-align: center;
            gap: 12px;
        }
        #loading-title {
            font-size: 20px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        #loading-stage {
            font-size: 14px;
            color: #9aa0a6;
        }
        #loading-bar {
            width: min(420px, 70vw);
            height: 8px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
        }
        #loading-bar > span {
            display: block;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            transition: width 150ms ease;
        }
        #loading-detail {
            font-size: 12px;
            color: #6e7378;
        }
        #diagnostics {
            position: absolute;
            bottom: 16px;
            left: 16px;
            padding: 10px 12px;
            font-size: 12px;
            color: #cdd0d5;
            background: rgba(0,0,0,0.45);
            border-radius: 8px;
            line-height: 1.4;
            min-width: 220px;
            pointer-events: none;
        }
    </style>
  </head>
  <body>
    <div id="game-container">
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
        <div id="loading">
            <div id="loading-title">SCP: Containment Breach</div>
            <div id="loading-stage">Initializing...</div>
            <div id="loading-bar"><span id="loading-progress"></span></div>
            <div id="loading-detail"></div>
        </div>
        <div id="diagnostics"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
