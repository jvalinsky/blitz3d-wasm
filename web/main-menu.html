<!DOCTYPE html>
<html>
<head>
    <title>SCP: Containment Breach - Main Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            overflow: hidden;
            cursor: none;
        }
        
        #menuContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }
        
        #menuBackground {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #scp173 {
            position: absolute;
            bottom: 0;
            right: 0;
            width: auto;
            height: 40%;
            opacity: 0;
            transition: opacity 0.1s;
        }
        
        #scp173.visible {
            opacity: 1;
        }
        
        #scpLogo {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            height: 80px;
        }
        
        .creepyText {
            position: absolute;
            color: #333;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.1s;
            pointer-events: none;
            z-index: 5;
        }
        
        .creepyText.visible {
            opacity: 1;
        }
        
        #menuButtons {
            position: absolute;
            left: 159px;
            top: 286px;
            width: 400px;
            z-index: 10;
        }
        
        .menuButton {
            width: 100%;
            height: 70px;
            margin-bottom: 30px;
            background: linear-gradient(to right, rgba(0,0,0,0.3), rgba(0,0,0,0.6));
            border: 2px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .menuButton:hover {
            background: linear-gradient(to right, rgba(255,255,255,0.2), rgba(255,255,255,0.3));
            border-color: rgba(255,255,255,0.6);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        
        .menuButton:active {
            transform: scale(0.98);
        }
        
        #customCursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.8);
            border: 2px solid #000;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
        
        #videoOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: none;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #videoOverlay video {
            max-width: 90%;
            max-height: 90%;
        }
        
        #videoOverlay .skipButton {
            margin-top: 20px;
            padding: 10px 30px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 2px solid #fff;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            cursor: pointer;
        }
        
        #videoOverlay .skipButton:hover {
            background: rgba(255,255,255,0.3);
        }
        
        #statusText {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #0f0;
            font-size: 14px;
            text-align: center;
            z-index: 20;
            text-shadow: 0 0 10px #0f0;
        }
    </style>
</head>
<body>
    <div id="menuContainer">
        <img id="menuBackground" src="./dist/assets/back.jpg" alt="Menu Background">
        <img id="scp173" src="./dist/assets/173back.jpg" alt="SCP-173">
        <img id="scpLogo" src="./dist/assets/scptext.jpg" alt="SCP Logo">
        
        <div class="creepyText" id="creepyText"></div>
        
        <div id="menuButtons">
            <button class="menuButton" onclick="newGame()">NEW GAME</button>
            <button class="menuButton" onclick="loadGame()">LOAD GAME</button>
            <button class="menuButton" onclick="options()">OPTIONS</button>
            <button class="menuButton" onclick="quit()">QUIT</button>
        </div>
        
        <div id="statusText">Main Menu Ready</div>
    </div>
    
    <div id="customCursor"></div>
    
    <div id="videoOverlay">
        <video id="introVideo"></video>
        <button class="skipButton" onclick="skipVideo()">Skip Intro</button>
    </div>
    
    <div id="startScreen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;">
        <h1 style="color: #fff; font-size: 48px; margin-bottom: 30px; text-shadow: 0 0 20px #fff;">SCP: Containment Breach</h1>
        <button id="startButton" style="padding: 20px 60px; font-size: 24px; background: rgba(255,255,255,0.2); color: #fff; border: 3px solid #fff; font-family: 'Courier New', monospace; cursor: pointer; transition: all 0.3s;">
            CLICK TO START
        </button>
        <p style="color: #888; margin-top: 20px; font-size: 14px;">Press any key or click to begin</p>
    </div>

    <script>
        // Custom cursor
        const cursor = document.getElementById('customCursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        
        // SCP-173 blinking effect
        const scp173 = document.getElementById('scp173');
        let blinkTimer = 1;
        let blinkDuration = 0;
        
        function updateBlink() {
            if (Math.random() < 0.0033) { // ~1/300 chance each frame
                blinkTimer = 4000 + Math.random() * 4000;
                blinkDuration = 200 + Math.random() * 300;
            }
            
            const currentTime = Date.now();
            if ((currentTime % blinkTimer) < blinkDuration) {
                scp173.classList.add('visible');
            } else {
                scp173.classList.remove('visible');
            }
            
            requestAnimationFrame(updateBlink);
        }
        updateBlink();
        
        // Creepy text effect
        const creepyTextEl = document.getElementById('creepyText');
        const creepyMessages = [
            "DON'T BLINK",
            "DON'T BLINK",
            "DON'T BLINK",
            "Secure. Contain. Protect.",
            "Secure. Contain. Protect.",
            "You want happy endings? Fuck you.",
            "You want happy endings? Fuck you.",
            "You want happy endings? Fuck you.",
            "Sometimes we would have had time to scream.",
            "Sometimes we would have had time to scream.",
            "Sometimes we would have had time to scream.",
            "NIL",
            "NO",
            "black white black white black white gray",
            "Stone does not care",
            "9341",
            "It controls the doors",
            "e8m106]af173o+079m895w914",
            "NIL",
            "It has taken over everything",
            "The spiral is growing",
            '"Some kind of gestalt effect due to massive reality damage."'
        ];
        
        let textTimer = 700 + Math.random() * 100;
        let textDuration = 0;
        
        function updateCreepyText() {
            textTimer--;
            
            if (textTimer < textDuration) {
                creepyTextEl.classList.add('visible');
                
                if (textTimer < 0) {
                    textTimer = 700 + Math.random() * 100;
                    textDuration = 10 + Math.random() * 25;
                    
                    // Random position
                    const x = 700 + Math.random() * 300;
                    const y = 100 + Math.random() * 500;
                    creepyTextEl.style.left = x + 'px';
                    creepyTextEl.style.top = y + 'px';
                    
                    // Random message
                    const msg = creepyMessages[Math.floor(Math.random() * creepyMessages.length)];
                    creepyTextEl.textContent = msg;
                }
            } else {
                creepyTextEl.classList.remove('visible');
            }
            
            setTimeout(updateCreepyText, 16); // ~60fps
        }
        updateCreepyText();
        
        // Video playback
        const videoOverlay = document.getElementById('videoOverlay');
        const introVideo = document.getElementById('introVideo');
        let currentVideoIndex = 0;
        const introVideos = [
            './assets/videos/startup_TSS.mp4',
            './assets/videos/startup_Undertow.mp4'
        ];
        
        function playIntroVideos() {
            if (currentVideoIndex >= introVideos.length) {
                // All videos played
                videoOverlay.style.display = 'none';
                updateStatus('Intro complete - Main menu ready');
                return;
            }
            
            const videoPath = introVideos[currentVideoIndex];
            updateStatus(`Playing intro ${currentVideoIndex + 1}/${introVideos.length}`);
            
            videoOverlay.style.display = 'flex';
            introVideo.src = videoPath;
            introVideo.load();
            
            introVideo.onloadedmetadata = () => {
                introVideo.play();
            };
            
            introVideo.onended = () => {
                currentVideoIndex++;
                playIntroVideos();
            };
            
            introVideo.onerror = () => {
                console.error('Video failed to load:', videoPath);
                currentVideoIndex++;
                playIntroVideos();
            };
        }
        
        function skipVideo() {
            introVideo.pause();
            currentVideoIndex = introVideos.length;
            videoOverlay.style.display = 'none';
            updateStatus('Intro skipped');
        }
        
        // Settings persistence
        const SETTINGS_KEY = 'scpcb_settings';
        
        function loadSettings() {
            try {
                const saved = localStorage.getItem(SETTINGS_KEY);
                return saved ? JSON.parse(saved) : {};
            } catch {
                return {};
            }
        }
        
        function saveSettings(settings) {
            try {
                localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
            } catch (e) {
                console.error('Failed to save settings:', e);
            }
        }
        
        // Load saved settings
        const settings = loadSettings();
        console.log('Loaded settings:', settings);
        
        // Menu button functions
        function newGame() {
            updateStatus('Starting new game...');
            
            // Save that we're starting a game
            saveSettings({ ...settings, lastAction: 'new_game', timestamp: Date.now() });
            
            // Navigate to game
            window.location.href = './game/scpcb_game.html';
        }
        
        function loadGame() {
            updateStatus('Loading saved games...');
            
            // Check for saved games in localStorage
            const saves = [];
            for (let i = 1; i <= 10; i++) {
                const save = localStorage.getItem(`scpcb_save_${i}`);
                if (save) {
                    try {
                        const data = JSON.parse(save);
                        saves.push({ slot: i, ...data });
                    } catch {}
                }
            }
            
            if (saves.length === 0) {
                alert('No saved games found');
                return;
            }
            
            // Show save selection
            const saveList = saves.map(s => `Slot ${s.slot}: ${s.date || 'Unknown date'}`).join('\n');
            const slot = prompt(`Select save slot:\n${saveList}\n\nEnter slot number (1-10):`);
            if (slot) {
                const slotNum = parseInt(slot);
                if (slotNum >= 1 && slotNum <= 10) {
                    saveSettings({ ...settings, lastAction: 'load_game', loadSlot: slotNum });
                    window.location.href = './game/scpcb_game.html?load=' + slotNum;
                }
            }
        }
        
        function options() {
            updateStatus('Opening options menu...');
            
            // Simple options dialog
            const introEnabled = localStorage.getItem('introEnabled') !== 'false';
            const skipIntro = confirm(`Current settings:\n\nPlay intro videos: ${introEnabled ? 'YES' : 'NO'}\n\nClick OK to ${introEnabled ? 'DISABLE' : 'ENABLE'} intro videos`);
            
            localStorage.setItem('introEnabled', skipIntro === introEnabled ? introEnabled : !introEnabled);
            updateStatus(`Intro videos ${skipIntro === introEnabled ? 'enabled' : 'disabled'}`);
        }
        
        function quit() {
            updateStatus('Exiting...');
            
            if (confirm('Are you sure you want to quit?')) {
                window.close();
                // Fallback if window.close() doesn't work
                document.body.innerHTML = '<h1 style="color:#fff;text-align:center;margin-top:40vh;">Thanks for playing!</h1>';
            }
        }
        
        function updateStatus(msg) {
            document.getElementById('statusText').textContent = msg;
            console.log('[MainMenu]', msg);
        }
        
        // Start screen (required for autoplay policy)
        const startScreen = document.getElementById('startScreen');
        const startButton = document.getElementById('startButton');
        
        function startGame() {
            startScreen.style.display = 'none';
            
            const introEnabled = localStorage.getItem('introEnabled') !== 'false';
            
            if (introEnabled) {
                playIntroVideos();
            } else {
                updateStatus('Main menu ready (intro disabled)');
            }
        }
        
        // Click to start
        startButton.addEventListener('click', startGame);
        
        // Any key to start
        document.addEventListener('keydown', (e) => {
            if (startScreen.style.display !== 'none') {
                startGame();
            }
        });
        
        // Hover effect for start button
        startButton.addEventListener('mouseenter', () => {
            startButton.style.background = 'rgba(255,255,255,0.4)';
            startButton.style.transform = 'scale(1.1)';
            startButton.style.boxShadow = '0 0 30px rgba(255,255,255,0.5)';
        });
        
        startButton.addEventListener('mouseleave', () => {
            startButton.style.background = 'rgba(255,255,255,0.2)';
            startButton.style.transform = 'scale(1)';
            startButton.style.boxShadow = 'none';
        });
        
        // ESC key handling  
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (videoOverlay.style.display === 'flex') {
                    skipVideo();
                }
            }
        }, { passive: true });
    </script>
</body>
</html>
