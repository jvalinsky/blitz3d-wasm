<!DOCTYPE html>
<html>
<head>
    <title>SCPCB Door - SMPK Test</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #fff; font-family: monospace; }
        canvas { border: 2px solid #4CAF50; display: block; margin: 20px auto; cursor: grab; }
        canvas:active { cursor: grabbing; }
        #info { text-align: center; padding: 20px; }
        .success { color: #4CAF50; }
        .error { color: #f44; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">🚪 SCPCB Door Model</h1>
    <div id="info">
        <div>Status: <span id="status">Loading...</span></div>
        <div>Vertices: <span id="verts">-</span></div>
        <div>Triangles: <span id="tris">-</span></div>
        <div>FPS: <span id="fps">-</span></div>
    </div>
    <canvas id="c" width="800" height="600"></canvas>
    <div id="log" style="padding: 20px; font-size: 12px;"></div>
    
    <script type="module">
        import { SimpleCamera, loadSMPK } from './dist/test-graphics-bundle.js';
        
        const canvas = document.getElementById('c');
        const log = document.getElementById('log');
        
        function print(msg, isError = false) {
            console.log(msg);
            const div = document.createElement('div');
            div.style.color = isError ? '#f44' : '#4CAF50';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }
        
        async function main() {
            try {
                const gl = canvas.getContext('webgl2');
                if (!gl) throw new Error('WebGL 2 not supported');
                print('✅ WebGL 2 ready');
                
                // Enable depth test
                gl.enable(gl.DEPTH_TEST);
                gl.depthFunc(gl.LEQUAL);
                
                // Compile shaders
                const vs = `#version 300 es
                    uniform mat4 u_mvp;
                    in vec3 position;
                    in vec3 normal;
                    in vec2 uv;
                    out vec3 v_normal;
                    out vec2 v_uv;
                    void main() {
                        gl_Position = u_mvp * vec4(position, 1.0);
                        v_normal = normal;
                        v_uv = uv;
                    }
                `;
                
                const fs = `#version 300 es
                    precision mediump float;
                    uniform sampler2D u_texture;
                    in vec3 v_normal;
                    in vec2 v_uv;
                    out vec4 color;
                    void main() {
                        vec3 norm = normalize(v_normal);
                        
                        // Sample texture
                        vec4 texColor = texture(u_texture, v_uv);
                        
                        // Two-light setup
                        vec3 light1 = normalize(vec3(0.5, 1.0, 0.5));
                        vec3 light2 = normalize(vec3(-0.5, 0.5, 0.3));
                        
                        float diff1 = max(dot(norm, light1), 0.0);
                        float diff2 = max(dot(norm, light2), 0.0) * 0.5;
                        
                        vec3 ambient = vec3(0.3, 0.3, 0.3);
                        vec3 finalColor = ambient * texColor.rgb + texColor.rgb * (diff1 + diff2);
                        color = vec4(finalColor, texColor.a);
                    }
                `;
                
                const vShader = gl.createShader(gl.VERTEX_SHADER);
                gl.shaderSource(vShader, vs);
                gl.compileShader(vShader);
                if (!gl.getShaderParameter(vShader, gl.COMPILE_STATUS)) {
                    throw new Error('Vertex shader: ' + gl.getShaderInfoLog(vShader));
                }
                
                const fShader = gl.createShader(gl.FRAGMENT_SHADER);
                gl.shaderSource(fShader, fs);
                gl.compileShader(fShader);
                if (!gl.getShaderParameter(fShader, gl.COMPILE_STATUS)) {
                    throw new Error('Fragment shader: ' + gl.getShaderInfoLog(fShader));
                }
                
                const prog = gl.createProgram();
                gl.attachShader(prog, vShader);
                gl.attachShader(prog, fShader);
                gl.linkProgram(prog);
                if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
                    throw new Error('Program: ' + gl.getProgramInfoLog(prog));
                }
                
                gl.useProgram(prog);
                print('✅ Shaders compiled');
                
                // Load SMPK file
                print('📦 Loading Door01.smpk...');
                const mesh = await loadSMPK('./dist/assets/Door01.smpk');
                print(`✅ Loaded: ${mesh.vertexCount} vertices`);
                
                document.getElementById('verts').textContent = mesh.vertexCount;
                document.getElementById('tris').textContent = mesh.indexCount ? (mesh.indexCount / 3) : (mesh.vertexCount / 3);
                
                // Create position buffer
                const vbo = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
                gl.bufferData(gl.ARRAY_BUFFER, mesh.positions, gl.STATIC_DRAW);
                
                const posLoc = gl.getAttribLocation(prog, 'position');
                gl.enableVertexAttribArray(posLoc);
                gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 0, 0);
                
                // Create normal buffer
                if (mesh.normals) {
                    const nbo = gl.createBuffer();
                    gl.bindBuffer(gl.ARRAY_BUFFER, nbo);
                    gl.bufferData(gl.ARRAY_BUFFER, mesh.normals, gl.STATIC_DRAW);
                    
                    const normLoc = gl.getAttribLocation(prog, 'normal');
                    gl.enableVertexAttribArray(normLoc);
                    gl.vertexAttribPointer(normLoc, 3, gl.FLOAT, false, 0, 0);
                    print(`✅ Normal buffer: ${mesh.normals.length / 3} normals`);
                }
                
                // Create UV buffer
                if (mesh.uvs) {
                    const ubo = gl.createBuffer();
                    gl.bindBuffer(gl.ARRAY_BUFFER, ubo);
                    gl.bufferData(gl.ARRAY_BUFFER, mesh.uvs, gl.STATIC_DRAW);
                    
                    const uvLoc = gl.getAttribLocation(prog, 'uv');
                    gl.enableVertexAttribArray(uvLoc);
                    gl.vertexAttribPointer(uvLoc, 2, gl.FLOAT, false, 0, 0);
                    print(`✅ UV buffer: ${mesh.uvs.length / 2} UVs`);
                }
                
                // Create index buffer if present
                let ibo = null;
                if (mesh.indices) {
                    ibo = gl.createBuffer();
                    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
                    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, mesh.indices, gl.STATIC_DRAW);
                    print(`✅ Index buffer: ${mesh.indices.length} indices`);
                }
                
                const mvpLoc = gl.getUniformLocation(prog, 'u_mvp');
                const texLoc = gl.getUniformLocation(prog, 'u_texture');
                
                // Load texture
                let texture = null;
                if (mesh.texturePath) {
                    print(`🖼️ Loading texture: ${mesh.texturePath}...`);
                    texture = gl.createTexture();
                    gl.bindTexture(gl.TEXTURE_2D, texture);
                    
                    // Placeholder white texture while loading
                    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE,
                                  new Uint8Array([255, 255, 255, 255]));
                    
                    // Load actual image
                    const img = new Image();
                    img.onload = () => {
                        gl.bindTexture(gl.TEXTURE_2D, texture);
                        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
                        gl.generateMipmap(gl.TEXTURE_2D);
                        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
                        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
                        print(`✅ Texture loaded: ${img.width}x${img.height}`);
                    };
                    img.onerror = () => {
                        print(`❌ Failed to load texture: ${mesh.texturePath}`, true);
                    };
                    img.src = './dist/assets/' + mesh.texturePath;
                } else {
                    print('ℹ️ No texture in SMPK');
                }
                
                // Calculate bounding box to determine camera distance
                let minX = Infinity, minY = Infinity, minZ = Infinity;
                let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
                for (let i = 0; i < mesh.positions.length; i += 3) {
                    minX = Math.min(minX, mesh.positions[i]);
                    minY = Math.min(minY, mesh.positions[i + 1]);
                    minZ = Math.min(minZ, mesh.positions[i + 2]);
                    maxX = Math.max(maxX, mesh.positions[i]);
                    maxY = Math.max(maxY, mesh.positions[i + 1]);
                    maxZ = Math.max(maxZ, mesh.positions[i + 2]);
                }
                const centerX = (minX + maxX) / 2;
                const centerY = (minY + maxY) / 2;
                const centerZ = (minZ + maxZ) / 2;
                const sizeX = maxX - minX;
                const sizeY = maxY - minY;
                const sizeZ = maxZ - minZ;
                const maxSize = Math.max(sizeX, sizeY, sizeZ);
                
                print(`📏 Bounds: X[${minX.toFixed(2)}, ${maxX.toFixed(2)}], Y[${minY.toFixed(2)}, ${maxY.toFixed(2)}], Z[${minZ.toFixed(2)}, ${maxZ.toFixed(2)}]`);
                print(`📐 Size: ${sizeX.toFixed(2)} x ${sizeY.toFixed(2)} x ${sizeZ.toFixed(2)}, max=${maxSize.toFixed(2)}`);
                print(`🎯 Center: (${centerX.toFixed(2)}, ${centerY.toFixed(2)}, ${centerZ.toFixed(2)})`);
                
                // Create camera - move back based on model size
                const camera = new SimpleCamera();
                const distance = maxSize * 2.5; // 2.5x the model size
                camera.position = [centerX, centerY, centerZ + distance];
                camera.target = [centerX, centerY, centerZ];
                camera.aspect = canvas.width / canvas.height;
                print(`📷 Camera at z=${camera.position[2].toFixed(2)}, looking at (${centerX.toFixed(2)}, ${centerY.toFixed(2)}, ${centerZ.toFixed(2)})`);
                print('✅ Camera ready');
                
                // Mouse controls
                let isDragging = false;
                let lastX = 0, lastY = 0;
                
                canvas.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    lastX = e.clientX;
                    lastY = e.clientY;
                });
                
                canvas.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        const dx = e.clientX - lastX;
                        const dy = e.clientY - lastY;
                        camera.rotateAroundTarget(dx, dy);
                        lastX = e.clientX;
                        lastY = e.clientY;
                    }
                });
                
                canvas.addEventListener('mouseup', () => isDragging = false);
                canvas.addEventListener('mouseleave', () => isDragging = false);
                
                document.getElementById('status').textContent = 'Ready!';
                document.getElementById('status').className = 'success';
                
                // Render loop
                let frames = 0;
                let lastTime = performance.now();
                
                function render() {
                    frames++;
                    const now = performance.now();
                    if (now - lastTime >= 1000) {
                        document.getElementById('fps').textContent = frames;
                        frames = 0;
                        lastTime = now;
                    }
                    
                    const mvp = camera.getMVP();
                    
                    gl.clearColor(0.1, 0.1, 0.15, 1.0);
                    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
                    
                    gl.uniformMatrix4fv(mvpLoc, false, mvp);
                    
                    // Bind texture
                    if (texture) {
                        gl.activeTexture(gl.TEXTURE0);
                        gl.bindTexture(gl.TEXTURE_2D, texture);
                        gl.uniform1i(texLoc, 0);
                    }
                    
                    if (ibo) {
                        // Check index type
                        const indexType = mesh.indices instanceof Uint32Array ? gl.UNSIGNED_INT : gl.UNSIGNED_SHORT;
                        gl.drawElements(gl.TRIANGLES, mesh.indexCount, indexType, 0);
                    } else {
                        gl.drawArrays(gl.TRIANGLES, 0, mesh.vertexCount);
                    }
                    
                    requestAnimationFrame(render);
                }
                
                print('🎬 Rendering door model...');
                render();
                
            } catch (error) {
                print('❌ Error: ' + error.message, true);
                document.getElementById('status').textContent = 'Error';
                document.getElementById('status').className = 'error';
                console.error(error);
            }
        }
        
        main();
    </script>
</body>
</html>
