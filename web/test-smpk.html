<!DOCTYPE html>
<html>
<head>
    <title>SCPCB Door - SMPK Test</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #fff; font-family: monospace; }
        canvas { border: 2px solid #4CAF50; display: block; margin: 20px auto; cursor: grab; }
        canvas:active { cursor: grabbing; }
        #info { text-align: center; padding: 20px; }
        .success { color: #4CAF50; }
        .error { color: #f44; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">🚪 SCPCB Door Model</h1>
    <div id="info">
        <div>Status: <span id="status">Loading...</span></div>
        <div>Vertices: <span id="verts">-</span></div>
        <div>Triangles: <span id="tris">-</span></div>
        <div>FPS: <span id="fps">-</span></div>
    </div>
    <canvas id="c" width="800" height="600"></canvas>
    <div id="log" style="padding: 20px; font-size: 12px;"></div>
    
    <script type="module">
        import { SimpleCamera, loadSMPK } from './dist/test-graphics-bundle.js';
        
        const canvas = document.getElementById('c');
        const log = document.getElementById('log');
        
        function print(msg, isError = false) {
            console.log(msg);
            const div = document.createElement('div');
            div.style.color = isError ? '#f44' : '#4CAF50';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }
        
        async function main() {
            try {
                const gl = canvas.getContext('webgl2');
                if (!gl) throw new Error('WebGL 2 not supported');
                print('✅ WebGL 2 ready');
                
                // Enable depth test
                gl.enable(gl.DEPTH_TEST);
                gl.depthFunc(gl.LEQUAL);
                
                // Compile shaders
                const vs = `#version 300 es
                    uniform mat4 u_mvp;
                    in vec3 position;
                    in vec3 normal;
                    void main() {
                        gl_Position = u_mvp * vec4(position, 1.0);
                    }
                `;
                
                const fs = `#version 300 es
                    precision mediump float;
                    out vec4 color;
                    void main() {
                        color = vec4(0.8, 0.8, 0.8, 1.0); // Gray
                    }
                `;
                
                const vShader = gl.createShader(gl.VERTEX_SHADER);
                gl.shaderSource(vShader, vs);
                gl.compileShader(vShader);
                if (!gl.getShaderParameter(vShader, gl.COMPILE_STATUS)) {
                    throw new Error('Vertex shader: ' + gl.getShaderInfoLog(vShader));
                }
                
                const fShader = gl.createShader(gl.FRAGMENT_SHADER);
                gl.shaderSource(fShader, fs);
                gl.compileShader(fShader);
                if (!gl.getShaderParameter(fShader, gl.COMPILE_STATUS)) {
                    throw new Error('Fragment shader: ' + gl.getShaderInfoLog(fShader));
                }
                
                const prog = gl.createProgram();
                gl.attachShader(prog, vShader);
                gl.attachShader(prog, fShader);
                gl.linkProgram(prog);
                if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
                    throw new Error('Program: ' + gl.getProgramInfoLog(prog));
                }
                
                gl.useProgram(prog);
                print('✅ Shaders compiled');
                
                // Load SMPK file
                print('📦 Loading Door01.smpk...');
                const mesh = await loadSMPK('./dist/assets/Door01.smpk');
                print(`✅ Loaded: ${mesh.vertexCount} vertices`);
                
                document.getElementById('verts').textContent = mesh.vertexCount;
                document.getElementById('tris').textContent = mesh.indexCount ? (mesh.indexCount / 3) : (mesh.vertexCount / 3);
                
                // Create vertex buffer
                const vbo = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
                gl.bufferData(gl.ARRAY_BUFFER, mesh.positions, gl.STATIC_DRAW);
                
                const posLoc = gl.getAttribLocation(prog, 'position');
                gl.enableVertexAttribArray(posLoc);
                gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 0, 0);
                
                // Create index buffer if present
                let ibo = null;
                if (mesh.indices) {
                    ibo = gl.createBuffer();
                    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
                    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, mesh.indices, gl.STATIC_DRAW);
                    print(`✅ Index buffer: ${mesh.indices.length} indices`);
                }
                
                const mvpLoc = gl.getUniformLocation(prog, 'u_mvp');
                
                // Create camera
                const camera = new SimpleCamera();
                camera.position = [0, 1, 3]; // Back and slightly up
                camera.target = [0, 0, 0];
                camera.aspect = canvas.width / canvas.height;
                print('✅ Camera ready');
                
                // Mouse controls
                let isDragging = false;
                let lastX = 0, lastY = 0;
                
                canvas.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    lastX = e.clientX;
                    lastY = e.clientY;
                });
                
                canvas.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        const dx = e.clientX - lastX;
                        const dy = e.clientY - lastY;
                        camera.rotateAroundTarget(dx, dy);
                        lastX = e.clientX;
                        lastY = e.clientY;
                    }
                });
                
                canvas.addEventListener('mouseup', () => isDragging = false);
                canvas.addEventListener('mouseleave', () => isDragging = false);
                
                document.getElementById('status').textContent = 'Ready!';
                document.getElementById('status').className = 'success';
                
                // Render loop
                let frames = 0;
                let lastTime = performance.now();
                
                function render() {
                    frames++;
                    const now = performance.now();
                    if (now - lastTime >= 1000) {
                        document.getElementById('fps').textContent = frames;
                        frames = 0;
                        lastTime = now;
                    }
                    
                    const mvp = camera.getMVP();
                    
                    gl.clearColor(0.1, 0.1, 0.15, 1.0);
                    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
                    
                    gl.uniformMatrix4fv(mvpLoc, false, mvp);
                    
                    if (ibo) {
                        // Check index type
                        const indexType = mesh.indices instanceof Uint32Array ? gl.UNSIGNED_INT : gl.UNSIGNED_SHORT;
                        gl.drawElements(gl.TRIANGLES, mesh.indexCount, indexType, 0);
                    } else {
                        gl.drawArrays(gl.TRIANGLES, 0, mesh.vertexCount);
                    }
                    
                    requestAnimationFrame(render);
                }
                
                print('🎬 Rendering door model...');
                render();
                
            } catch (error) {
                print('❌ Error: ' + error.message, true);
                document.getElementById('status').textContent = 'Error';
                document.getElementById('status').className = 'error';
                console.error(error);
            }
        }
        
        main();
    </script>
</body>
</html>
